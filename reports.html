<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AssetFlow – Reports</title>
<link rel="stylesheet" href="css/style.css" />
</head>
<body>
<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script>
function barChart(data, key, labelKey, color) {
  const max = Math.max(1, ...data.map(d => d[key]));
  return `<div style="display:flex; align-items:flex-end; gap:12px; height:160px;">
    ${data.map(d => `
      <div style="flex:1; display:flex; flex-direction:column; align-items:center; justify-content:flex-end; height:100%;">
        <div style="width:100%; background:${color}; border-radius:6px 6px 0 0; height:${(d[key] / max) * 100}%;"></div>
        <p style="font-size:0.75rem; color:rgba(43,42,40,0.5); margin-top:8px; text-align:center;">${d[labelKey]}</p>
      </div>`).join('')}
  </div>`;
}

(async function () {
  const user = await guardPage('reports.html', '<p style="color:rgba(43,42,40,0.5)">Loading...</p>');
  if (!user) return;

  const [utilization, idle, maintenanceFreq] = await Promise.all([
    api.get('/dashboard/utilization-by-department'),
    api.get('/dashboard/idle-assets'),
    api.get('/dashboard/maintenance-frequency'),
  ]);

  const idleRows = idle.length
    ? idle.map(a => `<tr><td>${a.asset_tag}</td><td>${a.name}</td><td style="color:rgba(43,42,40,0.6)">${a.location || ''}</td></tr>`).join('')
    : `<tr><td colspan="3" style="text-align:center; color:rgba(43,42,40,0.4); padding:16px;">No idle assets 🎉</td></tr>`;

  document.querySelector('main.content').innerHTML = `
    <div class="page-header"><div><h1>Reports & Analytics</h1><p>Utilization, maintenance trends and idle assets — at a glance.</p></div></div>
    <div class="grid-2" style="margin-bottom:32px;">
      <div class="card">
        <h3 style="margin-top:0;">Utilization by Department</h3>
        ${utilization.length ? barChart(utilization, 'allocated_assets', 'department', 'var(--sun)') : '<p style="color:rgba(43,42,40,0.4); font-size:0.88rem;">No allocation data yet.</p>'}
      </div>
      <div class="card">
        <h3 style="margin-top:0;">Maintenance Frequency</h3>
        ${maintenanceFreq.length ? barChart(maintenanceFreq, 'requests', 'month', 'var(--coral)') : '<p style="color:rgba(43,42,40,0.4); font-size:0.88rem;">No maintenance data yet.</p>'}
      </div>
    </div>
    <div class="card">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:16px;">
        <h3 style="margin:0;">Idle Assets (60+ days unused)</h3>
        <button class="btn-outline" onclick="window.print()">Export Report</button>
      </div>
      <table><thead><tr><th>Tag</th><th>Name</th><th>Location</th></tr></thead><tbody>${idleRows}</tbody></table>
    </div>
  `;
})();
</script>
</body>
</html>
